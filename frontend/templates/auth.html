<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orion Auth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}" />

</head>

<body class="min-h-screen bg-gradient-to-b from-[#f7fafc] via-white to-[#eef4fb] text-slate-700">
    <div class="pointer-events-none fixed inset-0 bg-[#aeb5c2]/30 backdrop-blur-sm"></div>

    <main class="relative z-10 mx-auto flex min-h-screen w-full max-w-md flex-col justify-center px-5 py-7">
        <section class="auth-card w-full p-5 sm:p-5" data-auth-root data-initial-mode="{{ initial_mode }}"
            data-next-url="{{ next_url }}">
            <div class="mb-5 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <span class="brand-dot h-2.5 w-2.5 rounded-full"></span>
                    <h1 class="text-[18px] font-bold tracking-wide text-[#334772]">ORION</h1>
                </div>
                <a href="{{ url_for('home') }}"
                    class="btn btn-circle h-12 w-12 border-0 bg-[#eff1f5] text-slate-400 hover:bg-[#e8ecf2]">x</a>
            </div>

            <div class="soft-tab-shell mb-5 grid grid-cols-2">
                <button id="tab-login" type="button" class="soft-tab">Log in</button>
                <button id="tab-signup" type="button" class="soft-tab">Sign up</button>
            </div>

            <p id="auth-message" class="mb-3 hidden rounded-xl px-3 py-2 text-sm"></p>

            <div id="view-login" class="hidden space-y-4">
                <label class="form-control w-full">
                    <span class="orion-label label-text">Email</span>
                    <input id="login-email" type="email" placeholder="you@email.com"
                        class="orion-input input input-bordered w-full" />
                </label>

                <label class="form-control w-full">
                    <span class="orion-label label-text">Password</span>
                    <div class="relative">
                        <input id="login-password" type="password" placeholder="Your password"
                            class="orion-input input input-bordered w-full pr-12" />
                        <button id="toggle-login-password" type="button"
                            class="absolute right-4 top-1/2 -translate-y-1/2 border-0 bg-transparent p-0 text-[#a1afc2] hover:text-[#8798b6]"
                            aria-label="Show or hide password" aria-pressed="false">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor" stroke-width="1.8">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M2.25 12s3.75-6.75 9.75-6.75S21.75 12 21.75 12s-3.75 6.75-9.75 6.75S2.25 12 2.25 12Z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                </label>

                <button id="login-submit" type="button" class="orion-cta btn mt-3 w-full">
                    Log in <span class="ml-2">&rsaquo;</span>
                </button>

                <p class="pt-1 text-center text-[12px] text-[#a1aec2]">
                    No account? <button id="go-signup" type="button" class="mint-link font-bold">Sign up</button>
                </p>
            </div>

            <div id="view-signup-step1" class="hidden space-y-4">
                <label class="form-control w-full">
                    <span class="orion-label label-text">First name</span>
                    <input id="signup-firstname" type="text" placeholder="Your first name"
                        class="orion-input input input-bordered w-full" />
                </label>

                <label class="form-control w-full">
                    <span class="orion-label label-text">Email</span>
                    <input id="signup-email" type="email" placeholder="you@email.com"
                        class="orion-input input input-bordered w-full" />
                </label>

                <label class="form-control w-full">
                    <span class="orion-label label-text">Password</span>
                    <div class="relative">
                        <input id="signup-password" type="password" placeholder="At least 6 characters"
                            class="orion-input input input-bordered w-full pr-12" />
                        <button id="toggle-signup-password" type="button"
                            class="absolute right-4 top-1/2 -translate-y-1/2 border-0 bg-transparent p-0 text-[#a1afc2] hover:text-[#8798b6]"
                            aria-label="Show or hide password" aria-pressed="false">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor" stroke-width="1.8">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M2.25 12s3.75-6.75 9.75-6.75S21.75 12 21.75 12s-3.75 6.75-9.75 6.75S2.25 12 2.25 12Z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                </label>

                <button id="signup-next" type="button" class="orion-cta btn mt-3 w-full">
                    Next <span class="ml-2">&rsaquo;</span>
                </button>
            </div>

            <div id="view-signup-step2" class="hidden space-y-3">
                <h2 class="priority-title">How important are these areas to
                    you?</h2>
                <p class="priority-subtitle">1 = lowest priority - 5 = highest priority</p>

                <div id="priority-list"></div>

                <button id="signup-create" type="button" class="orion-cta btn mt-2 w-full">
                    Create account <span class="ml-2">&rsaquo;</span>
                </button>
                <button id="signup-back" type="button" class="btn btn-ghost w-full text-[15px] text-[#a9b4c6]">&larr;
                    Back</button>
            </div>

        </section>

        {% include 'partials/footer.html' %}
    </main>

    <script src="{{ url_for('static', filename='js/auth.js') }}" defer></script>
    {% include 'partials/team-dialog.html' %}
</body>

</html>
