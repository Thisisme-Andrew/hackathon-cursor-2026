<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orion</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}" />
    <style>
        @keyframes breathe-dot {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(123, 183, 154, 0.35);
            }

            50% {
                transform: scale(1.22);
                box-shadow: 0 0 0 11px rgba(123, 183, 154, 0);
            }
        }

        @keyframes breathe-ring {

            0%,
            100% {
                opacity: 0.45;
                transform: scale(1);
            }

            50% {
                opacity: 0.28;
                transform: scale(1.04);
            }
        }

        @keyframes orb-breathe {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 14px 36px rgba(104, 170, 140, 0.28);
            }

            50% {
                transform: scale(1.07);
                box-shadow: 0 22px 52px rgba(104, 170, 140, 0.42);
            }
        }

        @keyframes ripple-boost {
            0% {
                transform: scale(1);
                opacity: 0.45;
            }

            100% {
                transform: scale(1.18);
                opacity: 0;
            }
        }

        .orion-orb {
            width: 190px;
            height: 190px;
            border-radius: 9999px;
            background: radial-gradient(circle at 30% 30%, #c8f0dd 0%, #8ec8ad 50%, #74b499 100%);
            box-shadow: 0 16px 42px rgba(104, 170, 140, 0.32);
            animation: orb-breathe 2.1s ease-in-out infinite;
            cursor: pointer;
            transition: filter .2s ease;
        }

        .orion-orb:hover {
            filter: saturate(1.1) brightness(1.03);
        }

        .orion-orb:active {
            animation-duration: 1.2s;
        }

        .orion-ring-1,
        .orion-ring-2,
        .orion-ring-3 {
            position: absolute;
            border-radius: 9999px;
            border: 1.5px solid rgba(109, 167, 141, 0.34);
            animation: breathe-ring 4.6s ease-in-out infinite;
        }

        .orion-ring-1 {
            width: 228px;
            height: 228px;
        }

        .orion-ring-2 {
            width: 264px;
            height: 264px;
            border-color: rgba(109, 167, 141, 0.24);
            animation-delay: .35s;
        }

        .orion-ring-3 {
            width: 300px;
            height: 300px;
            border-color: rgba(109, 167, 141, 0.2);
            animation-delay: .7s;
        }

        .orion-logo-dot {
            animation: breathe-dot 1.9s ease-in-out infinite;
        }

        .ripple-boost .orion-ring-1,
        .ripple-boost .orion-ring-2,
        .ripple-boost .orion-ring-3 {
            animation: ripple-boost .9s ease-out;
        }

        #team-dialog::backdrop {
            background: rgba(44, 57, 86, 0.35);
            backdrop-filter: blur(3px);
        }
    </style>
</head>

<body class="min-h-screen bg-white text-slate-700">
    <main class="mx-auto flex min-h-screen w-full max-w-md flex-col px-6 pt-8 pb-5">
        <section class="pt-4 text-center">
            <div class="mb-3 flex items-center justify-center gap-3">
                <span class="orion-logo-dot h-3 w-3 rounded-full bg-[#7bb79a] shadow"></span>
                <h1 class="text-4xl font-extrabold tracking-[0.32em] text-[#334772]">ORION</h1>
                <span class="orion-logo-dot h-3 w-3 rounded-full bg-[#7bb79a] shadow"></span>
            </div>

            <p class="mb-10 text-xs font-semibold tracking-[0.24em] text-[#667eab]">
                VENT • FOCUS • ACTION
            </p>

            <div id="orb-wrap" class="relative mb-12 mt-2 flex items-center justify-center py-5">
                <div class="orion-ring-3"></div>
                <div class="orion-ring-2"></div>
                <div class="orion-ring-1"></div>
                <button id="orb-button" type="button" class="orion-orb" aria-label="Animate orb"></button>
            </div>

            <p class="mx-auto mb-9 max-w-sm text-xl leading-relaxed text-[#6c80a8]">
                Speak freely. Orion helps turn what feels overwhelming into a clear action plan.
            </p>

            <div class="mx-auto flex w-full max-w-sm flex-col gap-5">
                <a href="{{ url_for('auth_page', mode='signup') }}"
                    class="btn h-14 rounded-full border-none bg-[#334772] text-lg font-bold text-white hover:bg-[#2b3d63]">
                    Get started - it's free
                </a>

                <a href="{{ url_for('demo_page') }}"
                    class="btn h-14 rounded-full border border-[#b9d7c9] bg-transparent text-lg font-bold text-[#6ea789] hover:border-[#9dcab4] hover:bg-[#e8f5ee]">
                    Try a demo first
                </a>

                <p class="pt-2 text-base text-[#9dafcb]">
                    Already have an account?
                    <a href="{{ url_for('auth_page', mode='login') }}" class="font-bold text-[#6ea789]">Log in</a>
                </p>
            </div>
        </section>

        <footer
            class="mt-auto flex items-center justify-center gap-3 pt-6 text-center text-xs tracking-wide text-slate-400">
            <span>Copyright 2026 Orion</span>
            <span class="text-slate-300">•</span>
            <button id="open-team" type="button" class="font-semibold text-[#7b8eb4] hover:text-[#5f7297]">Meet the
                team</button>
        </footer>
    </main>

    <dialog id="team-dialog" class="w-[90%] max-w-sm rounded-2xl border-0 bg-white p-0 shadow-2xl">
        <div class="px-5 py-4">
            <div class="mb-3 flex items-center justify-between">
                <h2 class="text-base font-bold tracking-wide text-[#334772]">Developers</h2>
                <form method="dialog">
                    <button class="btn btn-circle btn-ghost btn-sm text-slate-400">x</button>
                </form>
            </div>
            <ul class="space-y-2 text-sm text-[#60749d]">
                <li>Sagesse Ariyanto</li>
                <li>Vincent Iyegbuye</li>
                <li>Andy</li>
                <li>Brody</li>
            </ul>
        </div>
    </dialog>

    <script>
        const orbWrap = document.getElementById("orb-wrap");
        const orbButton = document.getElementById("orb-button");
        const teamDialog = document.getElementById("team-dialog");
        const openTeam = document.getElementById("open-team");

        orbButton.addEventListener("click", () => {
            orbWrap.classList.remove("ripple-boost");
            void orbWrap.offsetWidth;
            orbWrap.classList.add("ripple-boost");
        });

        openTeam.addEventListener("click", () => teamDialog.showModal());
    </script>
</body>

</html>
