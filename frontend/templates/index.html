<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aria</title>
    <!-- Generated CSS output from Tailwind + daisyUI. -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}" />
</head>

<body class="min-h-screen bg-base-200">
    <main class="mx-auto max-w-4xl p-6">
        <div class="navbar mb-6 rounded-box bg-base-100 shadow">
            <div class="flex-1">
                <span class="text-xl font-bold">Aria</span>
            </div>
            <div class="flex-none">
                <span class="badge badge-primary">Flask + Jinja</span>
            </div>
        </div>

        <section class="card bg-base-100 shadow-xl">
            <div class="card-body">
                <h1 class="card-title text-2xl">Simple daisyUI starter page</h1>
                <p>This page is rendered by Flask and styled with Tailwind + daisyUI.</p>

                <div class="mt-2 flex flex-wrap gap-2">
                    <button class="btn btn-primary">Primary action</button>
                    <button class="btn btn-outline">Secondary action</button>
                </div>

                <div class="alert alert-info mt-4">
                    <span>If you can see this, your frontend pipeline is working.</span>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
